substitutions:
  name: esp-cc-dimmer
  friendly_name: CC Dimmer
  dim_step: "5%"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap: {}

captive_portal:

i2c:
  sda: GPIO6
  scl: GPIO7
  frequency: 400kHz

# Constant-current LED dimming via NLDD-1050H PWM_DIM input
output:
  - platform: ledc
    id: led_pwm
    pin: GPIO10
    frequency: 50kHz

light:
  - platform: monochromatic
    id: led_light
    name: Light
    output: led_pwm
    restore_mode: RESTORE_DEFAULT_OFF

# Rotary encoder (A=GPIO4, B=GPIO3, common=GND). ESP32-C3 has no PCNT, so
# ESPHome falls back to an ISR-based counter automatically.
sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a:
      number: GPIO4
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO3
      mode:
        input: true
        pullup: true
    on_clockwise:
      - light.dim_relative:
          id: led_light
          relative_brightness: ${dim_step}
    on_anticlockwise:
      - light.dim_relative:
          id: led_light
          relative_brightness: -${dim_step}

  - platform: veml7700
    address: 0x10
    update_interval: 60s
    ambient_light:
      name: Ambient Light
    full_spectrum:
      name: Full Spectrum

# Encoder push switch (S2 tied to GND): toggles the light
binary_sensor:
  - platform: gpio
    id: encoder_button
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      - light.toggle: led_light
